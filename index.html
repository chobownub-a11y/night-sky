<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>모두의 밤하늘 · 수묵 방명록</title>
<meta name="description" content="방문자가 함께 그리는 수묵화 밤하늘 방명록. 빈 하늘을 눌러 소원을 남기고, 빛에 머물러 다른 사람의 소원을 읽어보세요.">
<meta property="og:title" content="모두의 밤하늘 · 수묵 방명록">
<meta property="og:description" content="별 하나, 마음 하나 — 다녀간 모두가 함께 그리는 먹빛 밤하늘.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1c1d22; --paper:#ece2c8; --seal:#b0322a; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#ece2c8;cursor:none;-webkit-tap-highlight-color:transparent}
  #sky{position:fixed;inset:0;z-index:1;display:block}

  #cursor{position:fixed;top:50%;left:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border-radius:50%;pointer-events:none;z-index:30;
    background:radial-gradient(circle,rgba(20,20,24,.75) 0%,rgba(20,20,24,.25) 45%,rgba(20,20,24,0) 72%);transition:width .16s,height .16s,margin .16s}
  #cursor.read{width:34px;height:34px;margin:-17px 0 0 -17px;background:radial-gradient(circle,rgba(20,20,24,0) 52%,rgba(120,40,34,.5) 60%,rgba(120,40,34,0) 74%)}
  @media (pointer:coarse){ html,body{cursor:auto} #cursor{display:none} }

  .ui{position:fixed;z-index:10;pointer-events:none;color:var(--ink)}
  .title{top:40px;left:54px}
  .title .k{font-family:'Nanum Brush Script',cursive;font-size:clamp(38px,6vw,54px);line-height:.9;color:#f1e9d6;text-shadow:0 2px 16px rgba(0,0,0,.6),0 0 2px rgba(0,0,0,.35)}
  .title .s{font-family:'Nanum Myeongjo',serif;font-size:13px;letter-spacing:7px;color:rgba(240,232,214,.66);margin-top:8px;margin-left:4px;text-shadow:0 1px 8px rgba(0,0,0,.55)}
  .count{top:46px;right:56px;text-align:right;font-family:'Nanum Myeongjo',serif}
  .count .n{font-size:15px;letter-spacing:2px;color:rgba(240,232,214,.72);text-shadow:0 1px 8px rgba(0,0,0,.55)}
  .count .n b{font-size:26px;font-weight:800;color:#f3ecda;text-shadow:0 2px 14px rgba(0,0,0,.55)}
  .count .s{font-size:11px;letter-spacing:3px;color:rgba(240,232,214,.5);margin-top:4px;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .hint{left:50%;bottom:40px;transform:translateX(-50%);font-family:'Gowun Batang',serif;font-size:clamp(12px,2.6vw,14px);letter-spacing:3px;color:rgba(240,232,214,.74);
    text-align:center;width:90%;text-shadow:0 1px 12px rgba(0,0,0,.6);animation:bre 4s ease-in-out infinite}
  @keyframes bre{0%,100%{opacity:.45}50%{opacity:.95}}

  #tip{position:fixed;z-index:18;pointer-events:none;max-width:280px;padding:16px 20px 14px;opacity:0;transform:translateY(8px) rotate(-.6deg);
    transition:opacity .22s,transform .22s;background:linear-gradient(175deg,#f4ecd7,#e7dcc0);box-shadow:0 12px 34px rgba(40,30,10,.28);border:1px solid rgba(120,95,55,.25)}
  #tip::after{content:"願";position:absolute;right:10px;bottom:7px;width:20px;height:20px;line-height:20px;text-align:center;font-family:'Nanum Myeongjo';font-size:12px;font-weight:800;color:#f4ecd7;background:var(--seal);border-radius:3px}
  #tip .m{font-family:'Nanum Brush Script',cursive;font-size:27px;line-height:1.25;color:#222;word-break:break-word}
  #tip .t{font-family:'Gowun Batang',serif;font-size:11.5px;letter-spacing:1px;color:rgba(60,45,25,.6);margin-top:9px}
  #tip.show{opacity:1;transform:translateY(0) rotate(-.6deg)}

  #compose{position:fixed;z-index:20;width:min(330px,92vw);padding:24px 24px 20px;opacity:0;transform:scale(.95) rotate(-.4deg);pointer-events:none;transition:opacity .22s,transform .22s;
    background:linear-gradient(175deg,#f5edd8,#e6dabd);box-shadow:0 24px 60px rgba(40,30,10,.4);border:1px solid rgba(120,95,55,.3)}
  #compose.show{opacity:1;transform:scale(1) rotate(-.4deg);pointer-events:auto}
  #compose .seal{position:absolute;top:18px;right:18px;width:30px;height:30px;line-height:30px;text-align:center;border-radius:4px;background:var(--seal);color:#f5edd8;font-family:'Nanum Myeongjo';font-weight:800;font-size:18px}
  #compose h3{font-family:'Nanum Brush Script',cursive;font-size:30px;color:#222;margin-bottom:4px}
  #compose .sub{font-family:'Gowun Batang',serif;font-size:11px;letter-spacing:2px;color:rgba(60,45,25,.55);margin-bottom:16px}
  #compose input{width:100%;background:rgba(255,252,242,.5);border:0;border-bottom:1.5px solid rgba(90,70,40,.4);color:#222;font-family:'Gowun Batang',serif;font-size:16px;padding:9px 4px;outline:none}
  #compose input::placeholder{color:rgba(90,70,40,.4)}
  .hue{display:flex;align-items:center;gap:10px;margin-top:18px;font-family:'Gowun Batang';font-size:12px;color:rgba(60,45,25,.6)}
  .hue span{display:flex;gap:8px}
  .hue b{width:20px;height:20px;border-radius:50%;cursor:pointer;border:1.5px solid transparent;transition:transform .12s,border-color .12s}
  .hue b:hover{transform:scale(1.18)} .hue b.on{border-color:#3a2c14;transform:scale(1.18)}
  .note{font-family:'Gowun Batang';font-size:10.5px;color:rgba(60,45,25,.45);margin-top:13px}
  .err{color:var(--seal);min-height:0;font-size:11px;font-family:'Gowun Batang';margin-top:8px;opacity:0;transition:opacity .2s}
  .err.show{opacity:1}
  .row{display:flex;gap:10px;margin-top:14px}
  .row button{flex:1;border:0;padding:11px;font-family:'Nanum Myeongjo',serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:filter .15s}
  .row .go{background:#23242a;color:#f0e7d0} .row .go:hover{filter:brightness(1.25)}
  .row .no{background:rgba(90,70,40,.12);color:rgba(60,45,25,.7)}

  #bgm{position:fixed;left:-9999px;top:-9999px;width:300px;height:170px;pointer-events:none;border:0}
  #audio{position:fixed;left:30px;bottom:30px;z-index:12;display:none;align-items:center;gap:10px}
  #audio.show{display:flex}
  #mute{width:36px;height:36px;border:1px solid rgba(120,95,55,.4);border-radius:50%;padding:0;
    background:rgba(236,226,200,.55);color:#3a2c14;display:flex;align-items:center;justify-content:center;cursor:pointer;
    backdrop-filter:blur(3px);transition:background .15s,transform .15s}
  #mute:hover{background:rgba(236,226,200,.9);transform:scale(1.08)}
  #mute svg{width:18px;height:18px;display:block}
  #vol{-webkit-appearance:none;appearance:none;width:92px;height:28px;background:transparent;outline:none;cursor:pointer}
  #vol::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:rgba(236,226,200,.5)}
  #vol::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;margin-top:-5px;
    background:#ece2c8;border:1px solid rgba(120,95,55,.55);box-shadow:0 1px 4px rgba(0,0,0,.35)}
  #vol::-moz-range-track{height:3px;border-radius:2px;background:rgba(236,226,200,.5)}
  #vol::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:#ece2c8;border:1px solid rgba(120,95,55,.55);box-shadow:0 1px 4px rgba(0,0,0,.35)}

  @media (max-width:640px){
    .title{top:22px;left:20px}
    .title .k{font-size:clamp(30px,9vw,38px)}
    .title .s{font-size:11px;letter-spacing:4px}
    .count{top:26px;right:20px}
    .count .n{font-size:12px} .count .n b{font-size:19px}
    .count .s{display:none}
    .hint{bottom:96px;width:86%;letter-spacing:2px}
    #audio{left:18px;bottom:18px}
  }
</style>
</head>
<body>
  <canvas id="sky" aria-label="모두의 밤하늘 방명록"></canvas>
  <div id="cursor"></div>

  <div class="ui title"><div class="k">모두의 밤하늘</div><div class="s">별 하나, 마음 하나</div></div>
  <div class="ui count" id="count"><div class="n">머문 빛 <b>0</b></div><div class="s">개의 소원이 이 밤에 남았습니다</div></div>
  <div class="ui hint">빈 하늘을 눌러 빛을 남기고 · 빛에 머물러 소원을 읽으세요</div>
  <div id="audio">
    <button id="mute" title="소리 켜기 / 끄기" aria-label="배경음 토글"></button>
    <input id="vol" type="range" min="0" max="100" value="50" aria-label="배경음 볼륨">
  </div>
  <div id="bgm" aria-hidden="true"></div>

  <div id="tip"><div class="m"></div><div class="t"></div></div>
  <div id="compose">
    <div class="seal">願</div>
    <h3>이 밤에 빛을 남기다</h3>
    <div class="sub">당신의 빛은 이 하늘에 오래 머뭅니다</div>
    <input id="msg" maxlength="60" placeholder="소원이나 한마디를 적어보세요" aria-label="소원">
    <div class="hue">빛깔<span id="hue"></span></div>
    <div class="err" id="err"></div>
    <div class="note">· 남긴 한마디는 모두에게 공개됩니다 ·</div>
    <div class="row"><button class="no" id="cancel">물러나다</button><button class="go" id="leave">띄우다 ✦</button></div>
  </div>

  <script src="config.js"></script>
  <script type="module">

  const cv=document.getElementById('sky'), ctx=cv.getContext('2d');
  let W=0,H=0,DPR=1;
  const stat=document.createElement('canvas'), sctx=stat.getContext('2d');

  let _s=20260607; function R(){ _s|=0; _s=_s+0x6D2B79F5|0; let t=Math.imul(_s^_s>>>15,1|_s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }

  const HUES=[ {n:'달빛',c:[252,244,214]}, {n:'흰빛',c:[244,248,252]}, {n:'붉은빛',c:[244,176,150]}, {n:'푸른빛',c:[176,214,236]} ];
  const HUESW=['#f6e9c4','#eef3fb','#f0b496','#b6dcee'];

  /* ---------------- glow sprites ---------------- */
  function glow(rgb,gleam){ const s=72,c=document.createElement('canvas'); c.width=c.height=s; const g=c.getContext('2d');
    const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    gr.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},1)`); gr.addColorStop(.18,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.55)`);
    gr.addColorStop(.5,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.12)`); gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr; g.beginPath(); g.arc(s/2,s/2,s/2,0,6.28); g.fill();
    if(gleam){ g.globalCompositeOperation='lighter'; g.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.5)`; g.lineWidth=1.1;
      g.beginPath(); g.moveTo(s/2,6); g.lineTo(s/2,s-6); g.moveTo(6,s/2); g.lineTo(s-6,s/2); g.stroke(); } return c; }
  const dustSprite=glow([248,244,228],false);
  const wishSprites=HUES.map(h=>glow(h.c,true));

  /* ---------------- static ink painting ---------------- */
  function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
  function paper(g){ g.save(); g.fillStyle='#ece2c8'; g.fillRect(0,0,W,H);
    for(let i=0;i<70;i++){ const x=R()*W,y=R()*H,r=80+R()*260,a=0.022+R()*0.04; g.fillStyle=R()<0.5?`rgba(150,120,70,${a})`:`rgba(255,250,235,${a})`; g.beginPath(); g.arc(x,y,r,0,6.28); g.fill(); }
    for(let i=0;i<1500;i++){ const x=R()*W,y=R()*H,a=R()*6.28,len=4+R()*15; g.strokeStyle=`rgba(120,95,55,${0.02+R()*0.035})`; g.lineWidth=1; g.beginPath(); g.moveTo(x,y); g.lineTo(x+Math.cos(a)*len,y+Math.sin(a)*len); g.stroke(); }
    for(let i=0;i<2600;i++){ g.fillStyle=`rgba(70,55,35,${0.03+R()*0.06})`; g.fillRect(R()*W,R()*H,1,1); }
    const vg=g.createRadialGradient(W/2,H*0.42,Math.min(W,H)*0.28,W/2,H*0.5,Math.max(W,H)*0.78); vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(70,52,24,0.2)'); g.fillStyle=vg; g.fillRect(0,0,W,H); g.restore(); }
  function inkSky(g){ g.save(); g.globalCompositeOperation='multiply';
    const gr=g.createLinearGradient(0,0,0,H*0.86); gr.addColorStop(0,'rgba(34,36,44,0.94)'); gr.addColorStop(0.4,'rgba(52,54,63,0.74)'); gr.addColorStop(0.72,'rgba(92,92,98,0.3)'); gr.addColorStop(1,'rgba(140,140,140,0)');
    g.fillStyle=gr; g.fillRect(0,0,W,H); g.filter='blur(46px)';
    for(let i=0;i<30;i++){ const x=R()*W,y=R()*H*0.62,r=130+R()*300; g.fillStyle=`rgba(22,23,30,${0.05+R()*0.1})`; g.beginPath(); g.arc(x,y,r,0,6.28); g.fill(); }
    g.filter='none'; g.restore();
    g.save(); g.globalCompositeOperation='lighter'; g.filter='blur(34px)'; g.translate(W*0.52,H*0.3); g.rotate(-0.46); g.fillStyle='rgba(150,160,180,0.05)'; g.fillRect(-W*0.7,-26,W*1.4,52); g.filter='none'; g.restore(); }
  function moon(g){ const mx=W*0.74,my=H*0.24,r=Math.min(W,H)*0.085;
    g.save(); g.globalCompositeOperation='lighter';
    const gl=g.createRadialGradient(mx,my,0,mx,my,r*4);
    gl.addColorStop(0,'rgba(246,240,216,0.42)'); gl.addColorStop(0.3,'rgba(234,228,204,0.14)'); gl.addColorStop(0.62,'rgba(232,226,202,0.05)'); gl.addColorStop(1,'rgba(232,226,202,0)');
    g.fillStyle=gl; g.beginPath(); g.arc(mx,my,r*4,0,6.28); g.fill(); g.restore();
    g.save();
    const dg=g.createRadialGradient(mx-r*0.3,my-r*0.32,r*0.15,mx,my,r);
    dg.addColorStop(0,'rgba(252,248,234,0.98)'); dg.addColorStop(0.72,'rgba(240,233,210,0.95)'); dg.addColorStop(1,'rgba(222,214,190,0.9)');
    g.fillStyle=dg; g.beginPath(); g.arc(mx,my,r,0,6.28); g.fill();
    g.filter='blur(3px)'; g.strokeStyle='rgba(214,206,182,0.55)'; g.lineWidth=2; g.beginPath(); g.arc(mx,my,r,0,6.28); g.stroke(); g.filter='none';
    g.beginPath(); g.arc(mx,my,r*0.97,0,6.28); g.clip();
    g.globalCompositeOperation='multiply'; g.filter='blur(2px)';
    const seas=[[-0.32,-0.18,0.34,0.07],[0.12,-0.34,0.22,0.06],[0.3,0.16,0.27,0.07],[-0.08,0.3,0.36,0.06],[-0.42,0.22,0.18,0.05],[0.4,-0.1,0.14,0.05]];
    for(const [ox,oy,cr,al] of seas){ g.fillStyle=`rgba(160,152,132,${al+R()*0.03})`; g.beginPath(); g.arc(mx+ox*r,my+oy*r,r*cr,0,6.28); g.fill(); }
    g.filter='none';
    for(let i=0;i<160;i++){ const a=R()*6.28,d=Math.sqrt(R())*r*0.95; g.fillStyle=`rgba(150,142,122,${0.04+R()*0.05})`; g.fillRect(mx+Math.cos(a)*d,my+Math.sin(a)*d,1,1); }
    g.restore();
    g.save(); g.strokeStyle='rgba(244,238,216,0.08)'; g.lineWidth=1.2; g.beginPath(); g.arc(mx,my,r*1.55,0,6.28); g.stroke();
    g.strokeStyle='rgba(244,238,216,0.05)'; g.lineWidth=1; g.beginPath(); g.arc(mx,my,r*1.95,0,6.28); g.stroke(); g.restore(); }
  function ridge(g,baseY,amp,fill,blur){ g.save(); if(blur)g.filter='blur(2.2px)'; g.fillStyle=fill; g.beginPath(); g.moveTo(0,H); g.lineTo(0,baseY);
    const steps=16; let py=baseY; for(let i=1;i<=steps;i++){ const x=W*i/steps; const y=baseY-Math.sin(i*1.25+_s%7)*amp*0.4-(R())*amp; g.quadraticCurveTo(W*(i-0.5)/steps,(py+y)/2-amp*0.5,x,y); py=y; } g.lineTo(W,H); g.closePath(); g.fill(); g.restore(); }
  function mountains(g){ ridge(g,H*0.7,30,'rgba(74,76,84,0.5)',true); ridge(g,H*0.78,46,'rgba(46,48,56,0.72)',true); ridge(g,H*0.86,66,'rgba(20,22,28,0.92)',false);
    g.save(); g.globalCompositeOperation='lighter'; g.filter='blur(16px)'; g.fillStyle='rgba(220,224,228,0.06)'; g.fillRect(0,H*0.7,W,H*0.1); g.filter='none'; g.restore(); }
  function birds(g){ g.save(); g.strokeStyle='rgba(20,22,28,0.55)'; g.lineCap='round'; const set=[[W*0.55,H*0.2,11],[W*0.6,H*0.17,8],[W*0.5,H*0.24,7]];
    for(const [x,y,s] of set){ g.lineWidth=s*0.16; g.beginPath(); g.moveTo(x-s,y); g.quadraticCurveTo(x-s*0.3,y-s*0.62,x,y-s*0.12); g.quadraticCurveTo(x+s*0.3,y-s*0.62,x+s,y); g.stroke(); } g.restore(); }
  function reeds(g){ g.save(); g.strokeStyle='rgba(18,20,26,0.5)'; g.lineCap='round'; const bx=W*0.07,by=H*0.97;
    for(let i=0;i<6;i++){ const len=H*(0.12+R()*0.16),sway=(R()-0.5)*40; g.lineWidth=2.2-R()*1.2; g.beginPath(); g.moveTo(bx+i*9,by); g.quadraticCurveTo(bx+i*9+sway*0.5,by-len*0.6,bx+i*9+sway,by-len); g.stroke();
      g.beginPath(); g.moveTo(bx+i*9+sway,by-len); g.lineTo(bx+i*9+sway-4,by-len-9); g.moveTo(bx+i*9+sway,by-len); g.lineTo(bx+i*9+sway+4,by-len-9); g.stroke(); } g.restore(); }
  function seal(g){ const w=46,h=46,x=W-86,y=H-104; g.save(); g.fillStyle='rgba(176,50,42,0.88)'; roundRect(g,x,y,w,h,6); g.fill();
    g.fillStyle='rgba(236,226,200,0.95)'; g.font='800 30px "Nanum Myeongjo", serif'; g.textAlign='center'; g.textBaseline='middle'; g.fillText('夜',x+w/2,y+h/2+1);
    for(let i=0;i<70;i++){ if(R()<0.55)continue; g.fillStyle='rgba(236,226,200,0.45)'; g.fillRect(x+R()*w,y+R()*h,1,1); } g.restore(); }
  function border(g){ g.save(); g.strokeStyle='rgba(30,28,30,0.28)'; g.lineWidth=1; g.strokeRect(28,28,W-56,H-56); g.strokeStyle='rgba(30,28,30,0.14)'; g.strokeRect(33,33,W-66,H-66); g.restore(); }
  function buildStatic(){ _s=20260607; sctx.setTransform(DPR,0,0,DPR,0,0); sctx.clearRect(0,0,W,H); paper(sctx); inkSky(sctx); moon(sctx); birds(sctx); mountains(sctx); reeds(sctx); seal(sctx); border(sctx); }

  /* ---------------- dynamic ---------------- */
  let dust=[], wishes=[]; const blooms=[], shoots=[]; let shootT=2.4;
  function makeDust(){ dust=[]; for(let i=0;i<240;i++){ const inBand=Math.random()<0.5; let nx=Math.random(),ny=0.05+Math.random()*0.66;
    if(inBand){ nx=Math.random(); ny=0.12+(0.52-(nx-0.1)*0.34)+(Math.random()-0.5)*0.16; ny=Math.max(0.04,Math.min(0.66,ny)); }
    dust.push({nx,ny,r:0.4+Math.random()*Math.random()*2.0,tw:0.6+Math.random()*1.6,ph:Math.random()*6.28,base:0.3+Math.random()*0.6}); } }
  function norm(s){ return { nx:Math.max(0,Math.min(1,+s.nx||0)), ny:Math.max(0,Math.min(1,+s.ny||0)), h:Math.max(0,Math.min(3,(s.h|0)||0)), msg:(s.msg||'').toString().slice(0,60), ts:+s.ts||Date.now() }; }

  /* ---------------- abuse guard ---------------- */
  const BAD=['시발','씨발','ㅅㅂ','병신','ㅂㅅ','좆','지랄','개새','새끼','엿먹','fuck','shit','bitch','asshole','nigger','죽어','자살'];
  function profane(t){ const x=t.toLowerCase().replace(/\s/g,''); return BAD.some(b=>x.includes(b)); }
  function canPost(){ try{ const last=+localStorage.getItem('ink_last')||0; return Date.now()-last>15000; }catch(e){ return true; } }
  function markPost(){ try{ localStorage.setItem('ink_last',Date.now()); }catch(e){} }

  /* ---------------- storage ---------------- */
  async function makeFirebase(cfg){
    const A=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const U=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const D=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const app=A.initializeApp(cfg); const auth=U.getAuth(app); await U.signInAnonymously(auth); const db=D.getDatabase(app);
    const starsRef=D.ref(db,'stars'), countRef=D.ref(db,'meta/count');
    return {
      start(onAdd,onCount){ D.onValue(countRef,s=>onCount(s.val()||0));
        D.onChildAdded(D.query(starsRef,D.limitToLast(2000)), snap=>{ const v=snap.val(); if(v) onAdd(v,(Date.now()-(+v.ts||0))<8000); }); },
      async add(s){ s.uid=auth.currentUser.uid; await D.set(D.push(starsRef),s); D.runTransaction(countRef,c=>(c||0)+1); } };
  }
  const CFG=(window.SKY_CONFIG||{}).firebase||{};

  /* ---------------- interaction ---------------- */
  const cursorEl=document.getElementById('cursor'), tip=document.getElementById('tip'), errEl=document.getElementById('err');
  let hovered=-1, pending=null, chosen=0, tipTimer=0;
  function wishAt(x,y,rad){ let best=-1,bd=rad*rad; for(let i=0;i<wishes.length;i++){ if(!wishes[i].msg)continue; const wx=wishes[i].nx*W,wy=wishes[i].ny*H; const d=(wx-x)**2+(wy-y)**2; if(d<bd){bd=d;best=i;} } return best; }
  function showTip(x,y,s){ tip.querySelector('.m').textContent=s.msg; tip.querySelector('.t').textContent='— '+rel(s.ts);
    tip.style.left=Math.max(8,Math.min(x+22,W-292))+'px'; tip.classList.add('show');
    tip.style.top=Math.max(16,Math.min(y-20,H-tip.offsetHeight-8))+'px'; }
  function onMove(x,y){ cursorEl.style.left=x+'px'; cursorEl.style.top=y+'px'; if(document.getElementById('compose').classList.contains('show'))return;
    const best=wishAt(x,y,20);
    if(best>=0){ hovered=best; cursorEl.classList.add('read'); showTip(x,y,wishes[best]); return; }
    hovered=-1; cursorEl.classList.remove('read'); tip.classList.remove('show'); }
  function rel(ts){ const d=Date.now()-ts,h=3600000,day=86400000; if(d<h)return Math.max(1,(d/60000)|0)+'분 전'; if(d<day)return((d/h)|0)+'시간 전'; return((d/day)|0)+'일 전'; }
  addEventListener('pointermove',e=>onMove(e.clientX,e.clientY));
  let down=null;
  addEventListener('pointerdown',e=>{ if(e.button!==0){down=null;return;} down={x:e.clientX,y:e.clientY,ui:!!e.target.closest('#compose,#audio')}; });
  addEventListener('pointercancel',()=>{ down=null; });
  addEventListener('pointerup',e=>{ const d=down; down=null;
    if(e.button!==0)return; if(!d||d.ui)return; if(e.target.closest('#compose,#audio'))return;
    if(document.getElementById('compose').classList.contains('show'))return;
    const x=e.clientX,y=e.clientY; if((x-d.x)**2+(y-d.y)**2>100)return;
    const coarse=e.pointerType==='touch';
    const best=wishAt(x,y,coarse?26:20);
    if(best>=0){ const s=wishes[best]; showTip(x,y,s); clearTimeout(tipTimer);
      if(coarse)tipTimer=setTimeout(()=>tip.classList.remove('show'),4000+s.msg.length*100); return; }
    if(coarse&&tip.classList.contains('show')){ clearTimeout(tipTimer); tip.classList.remove('show'); return; }
    tip.classList.remove('show');
    pending={nx:x/W,ny:Math.min(y/H,0.72)}; openCompose(x,y); });

  const hueEl=document.getElementById('hue'); HUESW.forEach((c,i)=>{ const b=document.createElement('b'); b.style.background=c; b.style.boxShadow='0 0 8px '+c; if(i===0)b.classList.add('on');
    b.onclick=()=>{ chosen=i; [...hueEl.children].forEach(x=>x.classList.remove('on')); b.classList.add('on'); }; hueEl.appendChild(b); });
  function showErr(m){ errEl.textContent=m; errEl.classList.add('show'); setTimeout(()=>errEl.classList.remove('show'),2600); }
  function openCompose(x,y){ const cm=document.getElementById('compose'); const cw=Math.min(330,W*0.92);
    if(W<=640||matchMedia('(pointer:coarse)').matches){ cm.style.left=(W-cw)/2+'px'; cm.style.top=Math.max(12,Math.min(y-30,H*0.1))+'px'; }
    else{ cm.style.left=Math.min(Math.max(x-165,12),Math.max(12,W-cw-12))+'px'; cm.style.top=Math.min(Math.max(y-30,12),Math.max(12,H-300))+'px'; }
    cm.classList.add('show'); errEl.classList.remove('show'); document.getElementById('msg').focus({preventScroll:true}); }
  function closeCompose(){ document.getElementById('compose').classList.remove('show'); document.getElementById('msg').value=''; pending=null; }
  document.getElementById('cancel').onclick=closeCompose;
  let posting=false;
  document.getElementById('leave').onclick=async()=>{ if(!pending||posting)return; const msg=document.getElementById('msg').value.trim().slice(0,60);
    if(profane(msg)){ showErr('부적절한 표현은 담을 수 없어요'); return; } if(!canPost()){ showErr('잠시 후 다시 띄워주세요'); return; }
    const s={nx:pending.nx,ny:pending.ny,h:chosen,msg,ts:Date.now()}; posting=true;
    try{ await Storage.add(s); markPost(); closeCompose(); chime(); }
    catch(e){ showErr('잠시 문제가 생겼어요'); console.warn(e); }
    finally{ posting=false; } };
  addEventListener('keydown',e=>{ if(e.key==='Escape')closeCompose();
    if(e.key==='Enter'&&!e.isComposing&&document.activeElement===document.getElementById('msg')&&document.getElementById('compose').classList.contains('show'))document.getElementById('leave').click(); });

  const countEl=document.getElementById('count'); let shown=0,target=0,gotCount=false;
  let actx=null; function chime(){ try{ actx=actx||new(window.AudioContext||window.webkitAudioContext)(); const t=actx.currentTime;
    [523.25,784].forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t+i*0.04); g.gain.exponentialRampToValueAtTime(i?0.07:0.13,t+i*0.04+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.04+1.1);
      o.connect(g); g.connect(actx.destination); o.start(t+i*0.04); o.stop(t+i*0.04+1.15); }); }catch(e){} }

  /* ---------------- loop ---------------- */
  let last=performance.now();
  function frame(now){ requestAnimationFrame(frame); const dt=Math.min((now-last)/1000,0.05); last=now; const t=now/1000;
    ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,W,H); ctx.drawImage(stat,0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    for(const s of dust){ const a=s.base*(0.55+0.45*Math.sin(t*s.tw+s.ph)); const sz=s.r*7+3; ctx.globalAlpha=a*0.6; ctx.drawImage(dustSprite,s.nx*W-sz/2,s.ny*H-sz/2,sz,sz); }
    for(const s of wishes){ const a=0.62+0.38*Math.sin(t*1.1+(s.nx+s.ny)*30); const sp=wishSprites[s.h||0]; const sz=(s===wishes[hovered]?30:20); ctx.globalAlpha=(s===wishes[hovered]?1:a); ctx.drawImage(sp,s.nx*W-sz/2,s.ny*H-sz/2,sz,sz); }
    ctx.globalAlpha=1;
    for(let k=blooms.length-1;k>=0;k--){ const b=blooms[k]; b.t+=dt; const e=b.t/1.2;
      ctx.globalCompositeOperation='multiply'; ctx.globalAlpha=Math.max(0,(1-e)*0.4); ctx.strokeStyle='rgba(30,28,30,1)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(b.x,b.y,4+e*46,0,6.28); ctx.stroke();
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=Math.max(0,1-e); const sp=wishSprites[b.h||0]; const sz=10+e*40; ctx.drawImage(sp,b.x-sz/2,b.y-sz/2,sz,sz); if(e>=1)blooms.splice(k,1); }
    ctx.globalAlpha=1;
    shootT-=dt; if(shootT<=0){ shootT=4+Math.random()*5; shoots.push({x:W*(0.2+Math.random()*0.6),y:H*(0.08+Math.random()*0.2),vx:-(160+Math.random()*120),vy:90+Math.random()*70,t:0}); }
    ctx.globalCompositeOperation='lighter';
    for(let k=shoots.length-1;k>=0;k--){ const s=shoots[k]; s.t+=dt; const e=s.t/0.9; const x=s.x+s.vx*s.t,y=s.y+s.vy*s.t;
      const g=ctx.createLinearGradient(x,y,x-s.vx*0.12,y-s.vy*0.12); g.addColorStop(0,`rgba(250,246,228,${(1-e)*0.85})`); g.addColorStop(1,'rgba(250,246,228,0)');
      ctx.strokeStyle=g; ctx.lineWidth=1.6; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-s.vx*0.12,y-s.vy*0.12); ctx.stroke(); if(e>=1)shoots.splice(k,1); }
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    if(shown!==target){ shown+=Math.ceil((target-shown)*0.2)||(target>shown?1:-1); if(Math.abs(target-shown)<2)shown=target; countEl.querySelector('.n b').textContent=shown.toLocaleString('en-US'); }
  }

  function resize(){ DPR=Math.min(devicePixelRatio,2); W=innerWidth; H=innerHeight; cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; stat.width=W*DPR; stat.height=H*DPR; buildStatic(); }
  addEventListener('resize',resize);

  let Storage;
  (async()=>{
    resize(); makeDust(); requestAnimationFrame(frame);
    try{ Storage = await makeFirebase(CFG); }
    catch(e){ console.warn('[밤하늘] 공유 연결 실패', e); return; }
    Storage.start((star,live)=>{ const s=norm(star); wishes.push(s); if(wishes.length>3000) wishes.shift(); if(live) blooms.push({x:s.nx*W,y:s.ny*H,t:0,h:s.h}); },
      (n)=>{ target=n; if(!gotCount){ gotCount=true; shown=n; countEl.querySelector('.n b').textContent=n.toLocaleString('en-US'); } });
  })();
  </script>

  <script>
  /* ---- 배경음 ---- */
  (function(){
    var VID='pYz_yhiycQg', FADE=12000;
    var player=null, ready=false, started=false, pending=false, muted=false, vol=50, ramping=false;
    var audio=document.getElementById('audio'), mute=document.getElementById('mute'), volEl=document.getElementById('vol');
    /* Tabler Icons (MIT) — volume / volume-3 */
    var SVG_OPEN='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">';
    var ICON_ON=SVG_OPEN+'<path d="M15 8a5 5 0 0 1 0 8"/><path d="M17.7 5a9 9 0 0 1 0 14"/><path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5"/></svg>';
    var ICON_OFF=SVG_OPEN+'<path d="M16 10l4 4m0 -4l-4 4"/><path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5"/></svg>';
    mute.innerHTML=ICON_ON; volEl.value=vol;
    var tag=document.createElement('script'); tag.src='https://www.youtube.com/iframe_api'; document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady=function(){
      player=new YT.Player('bgm',{ videoId:VID,
        playerVars:{ autoplay:0, controls:0, disablekb:1, fs:0, loop:1, playlist:VID, modestbranding:1, playsinline:1, rel:0 },
        events:{
          onReady:function(){ ready=true; try{ player.setVolume(0); }catch(e){} if(pending) doStart(); },
          onStateChange:function(e){ if(e.data===YT.PlayerState.ENDED){ try{ player.seekTo(0,true); player.playVideo(); }catch(_){} } }
        } });
    };
    function ramp(){ ramping=true; var t0=performance.now(); (function step(now){ if(!ramping||muted||!started) return;
      var p=Math.min(1,(now-t0)/FADE); try{ player.setVolume(Math.round(p*vol)); }catch(e){} if(p<1) requestAnimationFrame(step); else ramping=false; })(performance.now()); }
    function doStart(){ if(started||!player) return; started=true; try{ player.unMute(); player.setVolume(0); player.playVideo(); }catch(e){} ramp(); audio.classList.add('show'); }
    function arm(){ if(started) return; if(ready) doStart(); else pending=true; }
    ['pointerdown','keydown','touchstart','wheel'].forEach(function(ev){ window.addEventListener(ev,arm,{passive:true}); });
    function icon(){ mute.innerHTML=(muted||vol===0)?ICON_OFF:ICON_ON; }
    volEl.addEventListener('input',function(){ vol=+volEl.value; ramping=false;
      if(muted&&vol>0){ muted=false; try{ player.unMute(); }catch(_){} }
      icon();
      if(started){ try{ player.setVolume(vol); }catch(_){} } });
    mute.addEventListener('click',function(e){ e.stopPropagation(); if(!started){ arm(); return; }
      muted=!muted; icon(); try{ if(muted){ player.mute(); } else { player.unMute(); player.setVolume(vol); } }catch(_){} });
  })();
  </script>
